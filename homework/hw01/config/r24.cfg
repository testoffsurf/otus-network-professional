!
version 15.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R24
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 100.0.0.252 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R24 to R21 ]===
 ip address 100.0.0.5 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R24 to R26 ]===
 ip address 10.0.0.9 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R24 to R23 ]===
 ip address 10.0.0.2 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R24 to R18 ]===
 ip address 100.0.0.9 255.255.255.252
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
