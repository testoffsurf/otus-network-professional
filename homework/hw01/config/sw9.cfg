!
version 15.2
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service compress-config
service sequence-numbers
!
hostname SW9
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
!
!
!
!
!
!
!
!
no ip domain-lookup
ip cef
no ipv6 cef
!
!
spanning-tree mode pvst
spanning-tree extend system-id
!
vlan internal allocation policy ascending
!
! 
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.78.0.250 255.255.255.255
!
interface Port-channel1
 description ===[ Link: SW9 to SW10 ]===
 switchport trunk allowed vlan 30
 switchport trunk encapsulation dot1q
!
interface Ethernet0/0
 switchport trunk allowed vlan 30
 switchport trunk encapsulation dot1q
 channel-protocol lacp
 channel-group 1 mode active
!
interface Ethernet0/1
 switchport trunk allowed vlan 30
 switchport trunk encapsulation dot1q
 channel-protocol lacp
 channel-group 1 mode active
!
interface Ethernet0/2
 description ===[ Link: e0/2 to VPC8 ]===
 switchport access vlan 30
 switchport mode access
 no lldp transmit
 no lldp receive
 no cdp enable
 spanning-tree portfast
 spanning-tree bpduguard enable
 ip dhcp snooping limit rate 100
!
interface Ethernet0/3
 description ===[ Link: SW9 to R17 ]===
 no switchport
 ip address 10.78.0.22 255.255.255.252
 duplex auto
!
interface Ethernet1/0
 description ===[ Link: SW9 to R16 ]===
 no switchport
 ip address 10.78.0.14 255.255.255.252
 duplex auto
!
interface Ethernet1/1
!
interface Ethernet1/2
!
interface Ethernet1/3
!
interface Vlan30
 description ===[ VLAN: Workstation equipment ]===
 ip address 10.78.1.2 255.255.255.0
 vrrp 30 ip 10.78.1.1
 vrrp 30 preempt delay minimum 30
 vrrp 30 priority 120
 vrrp 30 authentication text MYPASS
!
!
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
!
control-plane
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
!
!
end
