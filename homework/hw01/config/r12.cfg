!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R12
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.251 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R12 to SW4 ]===
 ip address 10.77.0.25 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R12 to SW5 ]===
 ip address 10.77.0.29 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R12 to R14 ]===
 ip address 10.77.0.6 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R12 to R15 ]===
 ip address 10.77.0.14 255.255.255.252
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
