!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R14
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.254 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R14 to R12 ]===
 ip address 10.77.0.5 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet0/1
 description ===[ Link: R14 to R13 ]===
 ip address 10.77.0.9 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet0/2
 description ===[ Link: R14 to R22 ]===
 ip address 100.78.0.2 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R14 to R19 ]===
 ip address 10.77.0.1 255.255.255.252
 ip ospf 1 area 101
!
router ospf 1
 router-id 10.77.0.254
 area 101 stub no-summary
 network 10.77.0.0 0.0.0.3 area 101
 network 10.77.0.4 0.0.0.3 area 0
 network 10.77.0.8 0.0.0.3 area 0
 network 10.77.0.254 0.0.0.0 area 0
 default-information originate always
!
router bgp 1001
 bgp log-neighbor-changes
 network 100.78.0.0 mask 255.255.255.252
 neighbor 100.78.0.1 remote-as 101
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
