!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R15
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.253 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R15 to R13 ]===
 ip address 10.77.0.17 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet0/1
 description ===[ Link: R15 to R12 ]===
 ip address 10.77.0.13 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet0/2
 description ===[ Link: R15 to R21 ]===
 ip address 100.77.0.6 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R15 to R20 ]===
 ip address 10.77.0.21 255.255.255.252
 ip ospf 1 area 102
!
router ospf 1
 router-id 10.77.0.253
 area 0 filter-list prefix PFL-AREA101 out
 network 10.77.0.12 0.0.0.3 area 0
 network 10.77.0.16 0.0.0.3 area 0
 network 10.77.0.20 0.0.0.3 area 102
 network 10.77.0.253 0.0.0.0 area 0
!
router bgp 1001
 bgp log-neighbor-changes
 network 100.77.0.4 mask 255.255.255.252
 neighbor 100.77.0.5 remote-as 301
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
ip prefix-list PFL-AREA101 seq 5 deny 10.77.0.0/30
ip prefix-list PFL-AREA101 seq 10 permit 0.0.0.0/0 le 32
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
