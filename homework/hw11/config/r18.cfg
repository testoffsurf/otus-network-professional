!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R18
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!


!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.78.0.254 255.255.255.255
!
interface Tunnel0
 ip address 172.16.0.2 255.255.255.252
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source Ethernet0/2
 tunnel destination 100.77.0.6
 tunnel path-mtu-discovery
!
interface Ethernet0/0
 description ===[ Link: R18 to R16 ]===
 ip address 10.78.0.1 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R18 to R17 ]===
 ip address 10.78.0.25 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R18 to R24 ]===
 ip address 100.0.0.10 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R18 to R26 ]===
 ip address 100.0.0.22 255.255.255.252
!
!
router eigrp PETER
 !
 address-family ipv4 unicast autonomous-system 1
  !
  af-interface default
   hello-interval 2
   hold-time 10
   passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/1
   no passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/0
   no passive-interface
  exit-af-interface
  !
  topology base
   variance 2
   redistribute static
  exit-af-topology
  network 10.78.0.0 0.0.0.3
  network 10.78.0.24 0.0.0.3
  network 10.78.0.254 0.0.0.0
  eigrp router-id 10.78.0.254
 exit-address-family
!
router bgp 2042
 bgp log-neighbor-changes
 bgp bestpath as-path multipath-relax
 network 100.0.0.8 mask 255.255.255.252
 network 100.0.0.20 mask 255.255.255.252
 redistribute eigrp 1
 neighbor 100.0.0.9 remote-as 520
 neighbor 100.0.0.9 prefix-list SPBFILTER-TO-TRIADA out
 neighbor 100.0.0.21 remote-as 520
 neighbor 100.0.0.21 prefix-list SPBFILTER-TO-TRIADA out
 maximum-paths 2
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
ip route 0.0.0.0 0.0.0.0 100.0.0.21 name "to R26 (ISP)"
!
!
ip prefix-list SPBFILTER-TO-TRIADA seq 10 deny 10.78.0.0/30
ip prefix-list SPBFILTER-TO-TRIADA seq 15 deny 10.78.0.0/28
ip prefix-list SPBFILTER-TO-TRIADA seq 20 deny 10.78.0.8/30
ip prefix-list SPBFILTER-TO-TRIADA seq 25 deny 10.78.0.12/30
ip prefix-list SPBFILTER-TO-TRIADA seq 30 deny 10.78.0.16/30
ip prefix-list SPBFILTER-TO-TRIADA seq 35 deny 10.78.0.16/28
ip prefix-list SPBFILTER-TO-TRIADA seq 40 deny 10.78.0.20/30
ip prefix-list SPBFILTER-TO-TRIADA seq 45 deny 10.78.0.24/30
ip prefix-list SPBFILTER-TO-TRIADA seq 50 deny 10.78.0.249/32
ip prefix-list SPBFILTER-TO-TRIADA seq 55 deny 10.78.0.250/32
ip prefix-list SPBFILTER-TO-TRIADA seq 60 deny 10.78.0.251/32
ip prefix-list SPBFILTER-TO-TRIADA seq 65 deny 10.78.0.252/32
ip prefix-list SPBFILTER-TO-TRIADA seq 70 deny 10.78.0.253/32
ip prefix-list SPBFILTER-TO-TRIADA seq 75 deny 10.78.0.254/32
ip prefix-list SPBFILTER-TO-TRIADA seq 80 deny 10.78.1.0/24
ip prefix-list SPBFILTER-TO-TRIADA seq 85 permit 0.0.0.0/0 le 32
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
