!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R21
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 100.77.0.254 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R21 to R15 ]===
 ip address 100.77.0.5 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R21 to R22 ]===
 ip address 100.77.0.1 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R21 to R24 ]===
 ip address 100.0.0.6 255.255.255.252
!
interface Ethernet0/3
 no ip address
 shutdown
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
router bgp 301
 bgp log-neighbor-changes
 network 100.0.0.4 mask 255.255.255.252
 network 100.77.0.0 mask 255.255.255.252
 network 100.77.0.4 mask 255.255.255.252
 neighbor 100.0.0.5 remote-as 520
 neighbor 100.77.0.2 remote-as 101
 neighbor 100.77.0.6 remote-as 1001
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
