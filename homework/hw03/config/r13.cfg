!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R13
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.250 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R13 to SW5 ]===
 ip address 10.77.0.37 255.255.255.252
 ip ospf 1 area 10
!
interface Ethernet0/1
 description ===[ Link: R13 to SW4 ]===
 ip address 10.77.0.33 255.255.255.252
 ip ospf 1 area 10
!
interface Ethernet0/2
 description ===[ Link: R13 to R15 ]===
 ip address 10.77.0.18 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet0/3
 description ===[ Link: R13 to R14 ]===
 ip address 10.77.0.10 255.255.255.252
 ip ospf 1 area 0
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
router ospf 1
 router-id 10.77.0.250
 network 10.77.0.8 0.0.0.3 area 0
 network 10.77.0.16 0.0.0.3 area 0
 network 10.77.0.32 0.0.0.3 area 10
 network 10.77.0.36 0.0.0.3 area 10
 network 10.77.0.250 0.0.0.0 area 10
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
