!
version 15.2
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service compress-config
service sequence-numbers
!
hostname SW5
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
!
!
!
!
!
!
!
!
no ip domain-lookup
ip cef
no ipv6 cef
!
!
!
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree vlan 10,20 priority 28672
spanning-tree vlan 999 priority 24576
!
vlan internal allocation policy ascending
!
! 
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.77.0.247 255.255.255.255
!
interface Port-channel1
 description ===[ Link: SW5 to SW4 ]===
 switchport trunk allowed vlan 10,20,999
 switchport trunk encapsulation dot1q
 spanning-tree portfast trunk
 spanning-tree link-type point-to-point
 spanning-tree guard loop
!
interface Ethernet0/0
 description ===[ Link: SW5 to SW2 ]===
 switchport trunk allowed vlan 10,20,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree portfast trunk
 spanning-tree link-type point-to-point
 spanning-tree guard loop
!
interface Ethernet0/1
 description ===[ Link: SW5 to SW3 ]===
 switchport trunk allowed vlan 10,20,999
 switchport trunk encapsulation dot1q
 switchport mode trunk
 spanning-tree portfast trunk
 spanning-tree link-type point-to-point
 spanning-tree guard loop
!
interface Ethernet0/2
 switchport trunk allowed vlan 10,20,999
 switchport trunk encapsulation dot1q
 channel-protocol lacp
 channel-group 1 mode active
!
interface Ethernet0/3
 switchport trunk allowed vlan 10,20,999
 switchport trunk encapsulation dot1q
 channel-protocol lacp
 channel-group 1 mode active
!
interface Ethernet1/0
 description ===[ Link: SW5 to R13 ]===
 no switchport
 ip address 10.77.0.38 255.255.255.252
 ip ospf 1 area 10
 duplex auto
!
interface Ethernet1/1
 description ===[ Link: SW5 to R12 ]===
 no switchport
 ip address 10.77.0.30 255.255.255.252
 ip ospf 1 area 10
 duplex auto
!
interface Ethernet1/2
!
interface Ethernet1/3
!
interface Vlan10
 description ===[ VLAN: Server equipment ]===
 ip address 10.77.1.3 255.255.255.128
 vrrp 10 ip 10.77.1.1
 vrrp 10 priority 150
 vrrp 10 authentication text MYPASS
!
interface Vlan20
 description ===[ VLAN: Workstation equipment ]===
 ip address 10.77.1.131 255.255.255.128
 vrrp 20 ip 10.77.1.129
 vrrp 20 priority 150
 vrrp 20 authentication text MYPASS
!
interface Vlan999
 description ===[ VLAN: Remote Control ]===
 ip address 10.77.0.227 255.255.255.240
 vrrp 99 ip 10.77.0.225
 vrrp 99 preempt delay minimum 30
 vrrp 99 priority 120
 vrrp 99 authentication text MYPASS
!
router ospf 1
 router-id 10.77.0.247
 network 10.77.0.28 0.0.0.3 area 10
 network 10.77.0.36 0.0.0.3 area 10
 network 10.77.0.247 0.0.0.0 area 10
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
!
!
!
!
!
control-plane
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
!
!
end
