!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R22
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 100.78.0.254 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R22 to R14 ]===
 ip address 100.78.0.1 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R22 to R21 ]===
 ip address 100.77.0.2 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R22 to R23 ]===
 ip address 100.0.0.2 255.255.255.252
!
interface Ethernet0/3
 no ip address
 shutdown
!
interface Ethernet1/0
 no ip address
 shutdown
!
interface Ethernet1/1
 no ip address
 shutdown
!
interface Ethernet1/2
 no ip address
 shutdown
!
interface Ethernet1/3
 no ip address
 shutdown
!
router bgp 101
 bgp log-neighbor-changes
 network 100.0.0.0 mask 255.255.255.252
 network 100.77.0.0 mask 255.255.255.252
 network 100.78.0.0 mask 255.255.255.252
 neighbor 100.0.0.1 remote-as 520
 neighbor 100.77.0.1 remote-as 301
 neighbor 100.78.0.2 remote-as 1001
 neighbor 100.78.0.2 default-originate
 neighbor 100.78.0.2 soft-reconfiguration inbound
 neighbor 100.78.0.2 prefix-list KITORNFILTER-TO-MOSCOW out
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
ip prefix-list KITORNFILTER-TO-MOSCOW seq 10 deny 100.0.0.0/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 15 deny 100.0.0.4/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 20 deny 100.0.0.8/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 25 deny 100.0.0.20/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 30 deny 100.77.0.0/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 35 deny 100.78.0.0/30
ip prefix-list KITORNFILTER-TO-MOSCOW seq 40 permit 0.0.0.0/0 le 32
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
