!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R18
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.78.0.254 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R18 to R16 ]===
 ip address 10.78.0.1 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R18 to R17 ]===
 ip address 10.78.0.25 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R18 to R24 ]===
 ip address 100.0.0.10 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R18 to R26 ]===
 ip address 100.0.0.22 255.255.255.252
!
!
router eigrp PETER
 !
 address-family ipv4 unicast autonomous-system 1
  !
  af-interface default
   hello-interval 2
   hold-time 10
   passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/1
   no passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/0
   no passive-interface
  exit-af-interface
  !
  topology base
   variance 2
   redistribute static
  exit-af-topology
  network 10.78.0.0 0.0.0.3
  network 10.78.0.24 0.0.0.3
  network 10.78.0.254 0.0.0.0
  eigrp router-id 10.78.0.254
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
ip route 0.0.0.0 0.0.0.0 100.0.0.21 name "to R26 (ISP)"
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
