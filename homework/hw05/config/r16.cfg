!
version 15.4
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps debug datetime msec localtime show-timezone year
service timestamps log datetime msec localtime show-timezone year
service password-encryption
service sequence-numbers
!
hostname R16
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
mmi polling-interval 60
no mmi auto-configure
no mmi pvc
mmi snmp-timeout 180
!
!
!
!
!
!
!
!
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
redundancy
!
!
! 
!
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 description ===[ Loopback interface ]===
 ip address 10.78.0.252 255.255.255.255
!
interface Ethernet0/0
 description ===[ Link: R16 to SW10 ]===
 ip address 10.78.0.9 255.255.255.252
!
interface Ethernet0/1
 description ===[ Link: R16 to R18 ]===
 ip address 10.78.0.2 255.255.255.252
!
interface Ethernet0/2
 description ===[ Link: R16 to SW9 ]===
 ip address 10.78.0.13 255.255.255.252
!
interface Ethernet0/3
 description ===[ Link: R16 to R32 ]===
 ip address 10.78.0.5 255.255.255.252
!
!
router eigrp PETER
 !
 address-family ipv4 unicast autonomous-system 1
  !
  af-interface default
   hello-interval 2
   hold-time 10
   passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/1
   summary-address 10.78.0.0 255.255.255.240
   no passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/2
   summary-address 10.78.0.0 255.255.255.240
   no passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/3
   summary-address 10.78.0.0 255.255.255.240
   no passive-interface
  exit-af-interface
  !
  af-interface Ethernet0/0
   summary-address 10.78.0.0 255.255.255.240
   no passive-interface
  exit-af-interface
  !
  topology base
   variance 2
  exit-af-topology
  network 10.78.0.0 0.0.0.3
  network 10.78.0.4 0.0.0.3
  network 10.78.0.8 0.0.0.3
  network 10.78.0.12 0.0.0.3
  network 10.78.0.252 0.0.0.0
  eigrp router-id 10.78.0.252
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
line con 0
 logging synchronous
line aux 0
line vty 0 4
 login
 transport input none
!
!
end
